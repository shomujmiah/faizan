<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizan Portal</title>
    <style>
        :root {
            --bg-color: radial-gradient(circle at top, #0f2027, #050b14);
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #34d399;
        }
        body { background: var(--bg-color); color: #ffffff; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 24px; padding: 25px; margin: 20px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }
        .tab-content { display: none; }
        #home-view { display: block; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .calendar-day { background: var(--card-bg); padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; }
        .row { display: flex; padding: 10px 0; border-bottom: 1px solid var(--border-color); }
        .row span { flex: 1; text-align: center; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(10,15,25,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border-color); }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

    <div id="home-view" class="tab-content">
        <div class="glass-card" style="text-align: center;">
            <p style="color: var(--accent); font-weight: bold;">NEXT JAMAA'H</p>
            <h1 id="timer">00:00:00</h1>
            <p id="next-prayer-name">Loading...</p>
        </div>
        <div id="app" class="glass-card">
            <h3>Today's Prayer Journey</h3>
            <div id="prayer-list"></div>
        </div>
    </div>

    <div id="timetable-view" class="tab-content">
        <div class="glass-card">
            <h3>June 2026</h3>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
        <div class="glass-card" id="salah-details">
            <h3>Schedule Details</h3>
            <p>Select a date to view.</p>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="showTab('home')">🧭<br>Home</div>
        <div class="nav-item" onclick="showTab('timetable')">📅<br>Timetable</div>
        <div class="nav-item" onclick="testNotification()">⚙️<br>Settings</div>
    </div>

    <script>
        // REPLACE THIS URL WITH YOUR WORKING DEPLOYMENT URL
        
const API_URL = 'https://script.google.com/macros/s/AKfycbxZVQfNzONfCldm77yBhkPLeUvPi12D1rAfoYUXhRGX_e25fPBYXr29wAUfvbcqYAPq/exec?action=getData';

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(tabId + '-view').style.display = 'block';
        }

        function generateCalendar(rows) {
            const grid = document.getElementById('calendar-grid');
            rows.forEach((row, idx) => {
                if (idx === 0) return;
                const day = document.createElement('div');
                day.className = 'calendar-day';
                day.innerText = idx;
                day.onclick = () => renderDetailedSchedule(row);
                grid.appendChild(day);
            });
        }

        function renderDetailedSchedule(row) {
            document.getElementById('salah-details').innerHTML = `
                <h3>Details</h3>
                <div class="row"><span>Fajr</span><span>${row[1]}</span><span>${row[6]}</span></div>
                <div class="row"><span>Zuhr</span><span>${row[3]}</span><span>${row[7]}</span></div>
                <div class="row"><span>Asr</span><span>${row[4]}</span><span>${row[8]}</span></div>
            `;
        }
        function startCountdown(rows) {
            const row = rows[30];
            const jamatStarts = [
                { name: "Fajr Jamat", time: row[6] },
                { name: "Zuhr Jamat", time: row[7] },
                { name: "Asr Jamat", time: row[8] },
                { name: "Maghrib Jamat", time: row[9] },
                { name: "Isha Jamat", time: row[10] }
            ];

            setInterval(() => {
                const now = new Date();
                let next = jamatStarts.find(j => {
                    if (j.time === "-") return false;
                    const [h, m] = j.time.split(':').map(Number);
                    let d = new Date();
                    d.setHours(h, m, 0, 0);
                    return d > now;
                });

                if (next) {
                    const [h, m] = next.time.split(':').map(Number);
                    let target = new Date();
                    target.setHours(h, m, 0, 0);
                    const diff = target - now;
                    const hrs = Math.floor(diff / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);
                    document.getElementById('next-prayer-name').innerText = `Next: ${next.name}`;
                    document.getElementById('timer').innerText = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                } else {
                    document.getElementById('next-prayer-name').innerText = "All Jamats completed";
                    document.getElementById('timer').innerText = "00:00:00";
                }
            }, 1000);
        }

        function setupNotifications(rows) {
            const todayRow = rows[30];
            const prayerMap = [
                { name: "Fajr", time: todayRow[6] }, { name: "Zuhr", time: todayRow[7] },
                { name: "Asr", time: todayRow[8] }, { name: "Maghrib", time: todayRow[9] },
                { name: "Isha", time: todayRow[10] }
            ];
            
            prayerMap.forEach(p => {
                if (!p.time || p.time === "-") return;
                const [h, m] = p.time.split(':').map(Number);
                let alarm = new Date();
                alarm.setHours(h, m - 15, 0, 0);

                if (alarm > new Date()) {
                    setTimeout(() => {
                        new Notification("Prayer Reminder", { body: `${p.name} Jamat starts in 15 minutes!` });
                    }, alarm - new Date());
                }
            });
        }

        function testNotification() {
            Notification.requestPermission().then(p => {
                if (p === "granted") alert("Notifications enabled!");
            });
        }

        // 2. The initApp function itself
    async function initApp() {
        try {
            const response = await fetch(API_URL, { mode: 'cors', redirect: 'follow' });
            const data = await response.json();
            const todayRow = data.data[30]; 
            
            renderPrayerJourney(todayRow); // Now these exist!
            setupNotifications(data.data);
            startCountdown(data.data);
            generateCalendar(data.data);
        } catch (err) {
            console.error("Fetch Error:", err);
            document.getElementById('app').innerHTML = "<h2>Error loading data.</h2>";
        }
    }

    // 3. ONLY NOW do you call the initialization
    document.addEventListener('DOMContentLoaded', initApp);
        
    </script>
</body>
</html>
