<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Faizan Portal</title>
</head>
<body>
    <div id="app">Loading Prayer Times...</div>

  <script>
  function handleData(response) {
    if (response.error) {
      console.error("Google Script Error:", response.error);
      document.getElementById('app').innerText = "Google Script Error: " + response.error;
    } else {
      console.log("Data Received:", response);
      document.getElementById('app').innerText = "Data received!";
      // renderDynamicTimelineRows(response.data);
    }
  }

  async function fetchTimes() {
    console.log("Attempting to load data...");
    
    // We use 'cors-anywhere' or a similar mirror to strip the restrictive headers
    // that Google Apps Script imposes on browsers.
    const url = 'https://script.google.com/macros/s/AKfycbzCKtE-mKx_X8OZMsvihtXKea9eBiHxstyWIhPNdnBFoFSZnAnz374V08gpm32W_4g3/exec?action=getData';
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);

    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        
        // This proxy returns the data in a 'contents' field
        const actualData = JSON.parse(data.contents);
        
        console.log("Data loaded via proxy:", actualData);
        document.getElementById('app').innerText = "Data Loaded!";
        // renderDynamicTimelineRows(actualData.data);
    } catch (err) {
        console.error("Proxy Load Error:", err);
        document.getElementById('app').innerText = "Error loading data.";
    }
}

  window.addEventListener('DOMContentLoaded', fetchTimes);
</script>
</body>
</html>
