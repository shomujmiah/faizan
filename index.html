<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizan Portal</title>
    <style>
        :root {
            --bg-color: radial-gradient(circle at top, #0f2027, #050b14);
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --accent: #34d399;
        }
        body { background: var(--bg-color); color: #ffffff; font-family: sans-serif; margin: 0; padding-bottom: 100px; }

/* Solid highlight (no flashing) */
.row.active {
    background-color: var(--accent);
    color: #050b14;
    border-radius: 8px;
    font-weight: bold;
}

/* Container for the dot spinner */
.dot-spinner {
    position: relative;
    width: 20px;
    height: 20px;
    display: inline-block;
    animation: rotate-group 1.2s linear infinite;
}

/* Individual dots */
.dot-spinner div {
    position: absolute;
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
    transform-origin: 10px 10px;
}

/* Position dots in a circle */
.dot-spinner div:nth-child(1) { transform: rotate(0deg) translate(8px); }
.dot-spinner div:nth-child(2) { transform: rotate(45deg) translate(8px); }
.dot-spinner div:nth-child(3) { transform: rotate(90deg) translate(8px); }
.dot-spinner div:nth-child(4) { transform: rotate(135deg) translate(8px); }
.dot-spinner div:nth-child(5) { transform: rotate(180deg) translate(8px); }
.dot-spinner div:nth-child(6) { transform: rotate(225deg) translate(8px); }
.dot-spinner div:nth-child(7) { transform: rotate(270deg) translate(8px); }
.dot-spinner div:nth-child(8) { transform: rotate(315deg) translate(8px); }

@keyframes rotate-group {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
        
        .glass-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--border-color); border-radius: 24px; padding: 25px; margin: 20px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37); }
        .tab-content { display: none; }
        #home-view { display: block; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .calendar-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: var(--accent); margin-bottom: 10px; }
        .calendar-day { background: var(--card-bg); padding: 15px 5px; border-radius: 8px; cursor: pointer; text-align: center; }
        .calendar-day.selected { background-color: var(--accent); color: #050b14; font-weight: bold; }
        .row { display: flex; padding: 10px 0; border-bottom: 1px solid var(--border-color); align-items: center; }
        .row span { flex: 1; text-align: center; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(10,15,25,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border-color); z-index: 1000; }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; }
        input[type=checkbox] { appearance: none; width: 50px; height: 25px; background: #333; border-radius: 25px; position: relative; cursor: pointer; }
        input[type=checkbox]:checked { background: var(--accent); }
        input[type=checkbox]::before { content: ''; position: absolute; width: 21px; height: 21px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        input[type=checkbox]:checked::before { transform: translateX(25px); }
    </style>
</head>
<body>

    

    <div id="home-view" class="tab-content">
        <div class="glass-card" style="text-align: center;">
            <p style="color: var(--accent); font-weight: bold;">NEXT JAMAA'H</p>
            <h1 id="timer">00:00:00</h1>
            <p id="next-prayer-name">
    <div class="dot-spinner">
        <div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div>
    </div> 
    
</p>
        </div>
        <div id="app" class="glass-card">
            <h3>Today's Prayer Journey</h3>
            <div id="prayer-list"></div>
        </div>
    </div>

    <div id="timetable-view" class="tab-content">
        <div class="glass-card">
            <h3>June 2026</h3>
            <div class="calendar-header">
                <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
        <div class="glass-card" id="salah-details">
            <h3>Schedule Details</h3>
            <p>Select a date to view.</p>
        </div>
    </div>

    <div id="settings-view" class="tab-content">
        <div class="glass-card">
            <h3>Configuration</h3>
            <div class="row">
                <span><strong>Force Refresh</strong></span>
                <button onclick="initApp()" style="background: var(--accent); border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Refresh</button>
            </div>
            <div class="row">
                <span><strong>24-Hour Format</strong></span>
                <input type="checkbox" id="time-toggle" onchange="localStorage.setItem('use24Hour', this.checked)">
            </div>
            <div class="row">
                <span><strong>Notifications</strong></span>
                <input type="checkbox" id="notify-toggle" onchange="toggleNotifications(this.checked)">
            </div>
            <div class="row">
    <span><strong>Upload Schedule Image</strong><br>
    <small>OCR to auto-update sheets</small></span>
    <input type="file" id="ocr-upload" accept="image/*">
    <button onclick="handleManualUpload()" style="background: var(--accent); border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-left: 10px;">
        Upload Now
    </button>
</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="showTab('home')">🧭<br>Home</div>
        <div class="nav-item" onclick="showTab('timetable')">📅<br>Timetable</div>
        <div class="nav-item" onclick="showTab('settings')">⚙️<br>Settings</div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxZVQfNzONfCldm77yBhkPLeUvPi12D1rAfoYUXhRGX_e25fPBYXr29wAUfvbcqYAPq/exec?action=getData';
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
    .then(reg => console.log('Service Worker Registered!', reg))
    .catch(err => console.log('Service Worker Failed!', err));
}
        function renderPrayerJourney(row) {
            const prayers = [{name: "Fajr", start: row[1], jamat: row[6]}, {name: "Zuhr", start: row[3], jamat: row[7]}, {name: "Asr", start: row[4], jamat: row[8]}, {name: "Maghrib", start: "-", jamat: row[9]}, {name: "Isha", start: row[5], jamat: row[10]}];
            let html = '<div class="row header"><span>Prayer</span><span>Start</span><span>Jamat</span></div>';
            prayers.forEach(p => html += `<div class="row"><span>${p.name}</span><span>${p.start}</span><span>${p.jamat}</span></div>`);
            document.getElementById('prayer-list').innerHTML = html;
        }

        function setupNotifications(rows) {
    // 1. Get today's prayer times from the 30th row (or current day)
    const todayRow = rows[30];
    const prayerMap = [
        { name: "Fajr", time: todayRow[6] },
        { name: "Zuhr", time: todayRow[7] },
        { name: "Asr", time: todayRow[8] },
        { name: "Maghrib", time: todayRow[9] },
        { name: "Isha", time: todayRow[10] }
    ];
    
    prayerMap.forEach(p => {
        if (!p.time || p.time === "-") return;
        
        const [h, m] = p.time.split(':').map(Number);
        const now = new Date();
        
        // Define the 15-minute window
        let alarm = new Date();
        alarm.setHours(h, m - 15, 0, 0);
        
        let jamatTime = new Date();
        jamatTime.setHours(h, m, 0, 0);

        // 2. Logic: Future Notification vs. Catch-up
        if (alarm > now) {
            // Future event: Set a timer
            setTimeout(() => {
                if (Notification.permission === "granted") {
                    new Notification("Prayer Reminder", { 
                        body: `${p.name} Jamat starts in 15 minutes!` 
                    });
                }
            }, alarm - now);
        } 
        else if (now >= alarm && now < jamatTime) {
            // Catch-up: App opened during the 15-minute window
            if (Notification.permission === "granted") {
                new Notification("Prayer Reminder", { 
                    body: `${p.name} Jamat starts soon! (You are in the 15-min window)` 
                });
            }
        }
    });
}
   function startCountdown(rows) {
    const row = rows[30];
    const jamats = [{n: "Fajr", t: row[6]}, {n: "Zuhr", t: row[7]}, {n: "Asr", t: row[8]}, {n: "Maghrib", t: row[9]}, {n: "Isha", t: row[10]}];
    
    // Store the last highlighted prayer to prevent flashing
    let lastActivePrayer = "";

    setInterval(() => {
        const now = new Date();
        const next = jamats.find(j => j.t !== "-" && new Date().setHours(...j.t.split(':'),0,0) > now);
        
        if (next) {
           
            const diff = new Date().setHours(...next.t.split(':'),0,0) - now;
            document.getElementById('next-prayer-name').innerText = `Next: ${next.n}`;
            document.getElementById('timer').innerText = new Date(diff).toISOString().substr(11, 8);
            
            // Only update the UI if the active prayer has actually changed
            if (lastActivePrayer !== next.n) {
                document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
                const rows = document.getElementById('prayer-list').querySelectorAll('.row');
                const targetRow = Array.from(rows).find(r => r.innerText.includes(next.n));
                if (targetRow) targetRow.classList.add('active');
                
                lastActivePrayer = next.n;
            }
        }
    }, 1000);
}

        function generateCalendar(rows) {
    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';
    
    // Header spacers
    const firstDate = new Date(rows[1][0]);
    const dayOfWeek = (firstDate.getDay() + 6) % 7; 
    for (let i = 0; i < dayOfWeek; i++) grid.appendChild(document.createElement('div'));

    rows.forEach((row, idx) => {
        if (idx === 0 || !row[0]) return;
        
        const dayDiv = document.createElement('div');
        dayDiv.className = 'calendar-day';
        dayDiv.innerHTML = `<strong>${idx}</strong>`;
        
        // Highlight today by default
        if (idx === new Date().getDate()) {
            dayDiv.classList.add('selected');
        }

        dayDiv.onclick = () => {
            // 1. Clear old selection
            document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
            
            // 2. Add selection to clicked date
            dayDiv.classList.add('selected');
            
            // 3. Update the details panel
            renderDetailedSchedule(row);
        };
        grid.appendChild(dayDiv);
    });
}

        async function renderDetailedSchedule(row) {
    const dateObj = new Date(row[0]);
    
    // 1. Format date for API (DD-MM-YYYY)
    const day = String(dateObj.getDate()).padStart(2, '0');
    const month = String(dateObj.getMonth() + 1).padStart(2, '0');
    const year = dateObj.getFullYear();
    const dateStr = `${day}-${month}-${year}`;

    // 2. Initial state: Show "Loading..." while API fetches
    const headerTitle = `${dateObj.toLocaleDateString('en-GB', {weekday: 'long', day: 'numeric', month: 'short'})}`;
    document.getElementById('salah-details').innerHTML = `
        <h3>${headerTitle} | <span style="color:var(--accent);">Loading Hijri...</span></h3>
        <div class="row header"><span>Salah</span><span>Start</span><span>Jamat</span></div>
        <div class="row"><span>Fajr</span><span>${row[1]}</span><span>${row[6]}</span></div>
        <div class="row"><span>Zuhr</span><span>${row[3]}</span><span>${row[7]}</span></div>
        <div class="row"><span>Asr</span><span>${row[4]}</span><span>${row[8]}</span></div>
        <div class="row"><span>Maghrib</span><span>-</span><span>${row[9]}</span></div>
        <div class="row"><span>Isha</span><span>${row[5]}</span><span>${row[10]}</span></div>
    `;

    // 3. Fetch Hijri date from AlAdhan API
    try {
        const response = await fetch(`https://api.aladhan.com/v1/gToH/${dateStr}?calendarMethod=UAQ`);
        const json = await response.json();
        const hijri = json.data.hijri;
        const hijriDateStr = `${hijri.day} ${hijri.month.en}, ${hijri.year} AH`;

        // 4. Update the header with the actual fetched date
        document.getElementById('salah-details').innerHTML = `
            <h3>${headerTitle} | <span style="color:var(--accent);">${hijriDateStr}</span></h3>
            <div class="row header"><span>Salah</span><span>Start</span><span>Jamat</span></div>
            <div class="row"><span>Fajr</span><span>${row[1]}</span><span>${row[6]}</span></div>
            <div class="row"><span>Zuhr</span><span>${row[3]}</span><span>${row[7]}</span></div>
            <div class="row"><span>Asr</span><span>${row[4]}</span><span>${row[8]}</span></div>
            <div class="row"><span>Maghrib</span><span>-</span><span>${row[9]}</span></div>
            <div class="row"><span>Isha</span><span>${row[5]}</span><span>${row[10]}</span></div>
        `;
    } catch (err) {
        console.error("Hijri API Error:", err);
        // Fallback if API fails
        document.getElementById('salah-details').innerHTML = document.getElementById('salah-details').innerHTML.replace("Loading Hijri...", "Hijri Unavailable");
    }
}

        async function uploadImage(input) {
    const file = input.files[0];
    const reader = new FileReader();
    
    reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        
        // Show loading state
        alert("Processing image... this may take a moment.");

        const response = await fetch(API_URL + '&action=ocrProcess', {
            method: 'POST',
            body: JSON.stringify({ image: base64 })
        });
        const result = await response.json();
        alert(result.message);
    };
    reader.readAsDataURL(file);
}
       async function handleManualUpload() {
    const fileInput = document.getElementById('ocr-upload');
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select an image first!");
        return;
    }

    const reader = new FileReader();
    reader.onload = async function(e) {
        const base64 = e.target.result.split(',')[1];
        
        // Indicate to the user that processing has started
        const btn = document.querySelector('button');
        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            // Add this as a separate variable
const BASE_URL = 'https://script.google.com/macros/s/AKfycbxZVQfNzONfCldm77yBhkPLeUvPi12D1rAfoYUXhRGX_e25fPBYXr29wAUfvbcqYAPq/exec';

// Update handleManualUpload to use BASE_URL, not API_URL
const response = await fetch(BASE_URL + '?action=ocrProcess', {
                method: 'POST',
                body: JSON.stringify({ image: base64 })
            });
            const result = await response.json();
            alert(result.message);
        } catch (err) {
            console.error(err);
            alert("Upload failed. Check console.");
        } finally {
            btn.innerText = "Upload Now";
            btn.disabled = false;
        }
    };
    reader.readAsDataURL(file);
} 
        function toggleNotifications(enabled) {
            if (enabled) Notification.requestPermission();
            localStorage.setItem('notificationsEnabled', enabled);
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(id + '-view').style.display = 'block';
        }
async function getHijriDate(dateString) {
    // dateString format: DD-MM-YYYY
    const url = `https://api.aladhan.com/v1/gToH/${dateString}?calendarMethod=UAQ`;
    try {
        const response = await fetch(url);
        const json = await response.json();
        return `${json.data.hijri.day} ${json.data.hijri.month.en}, ${json.data.hijri.year} AH`;
    } catch (err) {
        console.error("Hijri API Error:", err);
        return ""; // Fallback if API fails
    }
}
        async function initApp() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const rows = data.data;
                renderPrayerJourney(rows[30]);
                renderDetailedSchedule(rows[30]);
                generateCalendar(rows);
                startCountdown(rows);
                setupNotifications(rows);
                // Load saved settings
                document.getElementById('time-toggle').checked = localStorage.getItem('use24Hour') === 'true';
                document.getElementById('notify-toggle').checked = localStorage.getItem('notificationsEnabled') === 'true';
            } catch (err) { console.error(err); }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
