<!DOCTYPE html>
<html>
<body>
    <h1>Prayer Times</h1>
    <div id="data">Loading...</div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxZVQfNzONfCldm77yBhkPLeUvPi12D1rAfoYUXhRGX_e25fPBYXr29wAUfvbcqYAPq/exec?action=getData';

        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                // data.data is your array of rows
                const rows = data.data; 
                renderUI(rows);
            })
            .catch(err => {
                document.getElementById('app').innerText = "Error: " + err;
            });

        function renderUI(rows) {
            // rows[0] is the header: ["Date", "Fajr_Start", ...]
            // rows[1] is the first day of the month, etc.
            
            let html = "<h1>Prayer Times</h1><table border='1'>";
            rows.forEach(row => {
                html += "<tr><td>" + row.join("</td><td>") + "</td></tr>";
            });
            html += "</table>";
            
            document.getElementById('app').innerHTML = html;
        }
    </script>
</body>
</html>
