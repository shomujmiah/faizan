<!DOCTYPE html>
<html>
<body>
    <h1>Prayer Times</h1>
    <div id="data">Loading...</div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxZVQfNzONfCldm77yBhkPLeUvPi12D1rAfoYUXhRGX_e25fPBYXr29wAUfvbcqYAPq/exec?action=getData';

        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('data').innerText = JSON.stringify(data.data);
            })
            .catch(err => {
                document.getElementById('data').innerText = "Error: " + err;
            });
    </script>
</body>
</html>
