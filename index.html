<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050b14">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizan Portal</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); --accent: #34d399; }
        body { background: #050b14; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Glassmorphism Cards */
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); 
                border-radius: 20px; padding: 20px; margin: 15px; }
        
        /* Layout */
        .header-card { text-align: center; }
        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        
        /* Bottom Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--glass); backdrop-filter: blur(20px);
                   display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--border); }
        .nav-item { cursor: pointer; text-align: center; font-size: 12px; }
        .switch { width: 40px; height: 20px; background: #333; border-radius: 20px; position: relative; }
    </style>
</head>
<body>

    <div class="card header-card">
        <h3 id="next-prayer-name">Loading...</h3>
        <h1 id="timer" style="font-size: 2.5em; color: var(--accent);">00:00:00</h1>
    </div>

    <div id="app" class="card">
        <h2>Today's Prayer Journey</h2>
        <div id="prayer-list"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="showTab('home')">🧭<br>Home</div>
        <div class="nav-item" onclick="showTab('timetable')">📅<br>Timetable</div>
        <div class="nav-item" onclick="showTab('settings')">⚙️<br>Settings</div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxZVQfNzONfCldm77yBhkPLeUvPi12D1rAfoYUXhRGX_e25fPBYXr29wAUfvbcqYAPq/exec?action=getData';

        async function initApp() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const todayRow = data.data[30]; 
                
                renderPrayerJourney(todayRow);
                setupNotifications(data.data);
                startCountdown(data.data);
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('app').innerHTML = "<h2>Error loading data.</h2>";
            }
        }

        function renderPrayerJourney(row) {
            const prayers = [
                { name: "Fajr", start: row[1], jamat: row[6] },
                { name: "Sunrise", start: row[2], jamat: "-" },
                { name: "Zuhr", start: row[3], jamat: row[7] },
                { name: "Asr", start: row[4], jamat: row[8] },
                { name: "Maghrib", start: "-", jamat: row[9] },
                { name: "Isha", start: row[5], jamat: row[10] }
            ];

            let html = '<h2>Today\'s Prayer Journey</h2>';
            html += '<div class="row header"><span>Prayer</span><span>Start</span><span>Jamat</span></div>';
            prayers.forEach(p => {
                html += `<div class="row"><span>${p.name}</span><span>${p.start}</span><span>${p.jamat}</span></div>`;
            });
            html += `<button onclick="testNotification()">Enable Notifications</button>`;
            document.getElementById('app').innerHTML = html;
        }

        // UPDATE: Countdown to use Jamat times
function startCountdown(rows) {
    const todayRow = rows[30];
    const jamatStarts = [
        { name: "Fajr Jamat", time: todayRow[6] },
        { name: "Zuhr Jamat", time: todayRow[7] },
        { name: "Asr Jamat", time: todayRow[8] },
        { name: "Maghrib Jamat", time: todayRow[9] },
        { name: "Isha Jamat", time: todayRow[10] }
    ];

    setInterval(() => {
        const now = new Date();
        let nextJamat = null;

        for (let j of jamatStarts) {
            if (j.time === "-") continue;
            const [h, m] = j.time.split(':').map(Number);
            let jamatDate = new Date();
            jamatDate.setHours(h, m, 0, 0);

            if (jamatDate > now) {
                nextJamat = { name: j.name, date: jamatDate };
                break;
            }
        }

        if (nextJamat) {
            const diff = nextJamat.date - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('next-prayer-name').innerText = `Next: ${nextJamat.name}`;
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        } else {
            document.getElementById('next-prayer-name').innerText = "All Jamats completed";
            document.getElementById('timer').innerText = "00:00:00";
        }
    }, 1000);
}
        function testNotification() {
            if (!("Notification" in window)) return;
            Notification.requestPermission().then(p => {
                if (p === "granted") new Notification("Faizan Portal", { body: "Notifications are now active!" });
            });
        }
function showTab(tab) {
            console.log("Switching to: " + tab);
            // You can add logic here to toggle visibility of different div IDs
        }
        function setupNotifications(rows) {
            const now = new Date();
            const todayRow = rows[30];
            const prayerMap = [
                { name: "Fajr", time: todayRow[6] },
                { name: "Zuhr", time: todayRow[7] },
                { name: "Asr", time: todayRow[8] },
                { name: "Maghrib", time: todayRow[9] },
                { name: "Isha", time: todayRow[10] }
            ];
            
            prayerMap.forEach(p => {
                if (!p.time || p.time === "-") return;
                const [h, m] = p.time.split(':').map(Number);
                let alarmDate = new Date();
                alarmDate.setHours(h, m - 15, 0, 0);

                if (alarmDate > now) {
                    const delay = alarmDate.getTime() - now.getTime();
                    setTimeout(() => {
                        new Notification("Prayer Reminder", { 
                            body: `${p.name} Jamat starts in 15 minutes!`,
                            icon: "https://cdn-icons-png.flaticon.com/512/3203/3203875.png" 
                        });
                    }, delay);
                }
            });
        }

        initApp();
        
        
    </script>
</body>
</html>
