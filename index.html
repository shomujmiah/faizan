<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Faizan Portal</title>
</head>
<body>
    <div id="app">Loading Prayer Times...</div>

    <script>
        // Use your published Google Script Web App URL here
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbzCKtE-mKx_X8OZMsvihtXKea9eBiHxstyWIhPNdnBFoFSZnAnz374V08gpm32W_4g3/exec?action=getData';

        async function fetchTimes() {
            try {
                const response = await fetch(GOOGLE_URL);
                const data = await response.json();
                
                // Render your data
                document.getElementById('app').innerText = "Prayer Times Loaded!";
                console.log(data);
            } catch (error) {
                document.getElementById('app').innerText = "Error loading data.";
                console.error(error);
            }
        }

        fetchTimes();
    </script>
</body>
</html>
