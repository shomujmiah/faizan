<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Faizan Portal</title>
</head>
<body>
    <div id="app">Loading Prayer Times...</div>

  <script>
  function handleData(response) {
    if (response.error) {
      console.error("Google Script Error:", response.error);
      document.getElementById('app').innerText = "Google Script Error: " + response.error;
    } else {
      console.log("Data Received:", response);
      document.getElementById('app').innerText = "Data received!";
      // renderDynamicTimelineRows(response.data);
    }
  }

  function fetchTimes() {
    console.log("Attempting to load...");
    const script = document.createElement('script');
    script.src = 'https://script.google.com/macros/s/AKfycbzCKtE-mKx_X8OZMsvihtXKea9eBiHxstyWIhPNdnBFoFSZnAnz374V08gpm32W_4g3/exec?action=getData&callback=handleData';
    
    script.onerror = () => {
      console.error("Script injection failed.");
      document.getElementById('app').innerText = "Error loading script.";
    };
    
    document.body.appendChild(script);
  }

  window.addEventListener('DOMContentLoaded', fetchTimes);
</script>
</body>
</html>
