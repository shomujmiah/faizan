<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050b14">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizan Portal</title>
    <style>
        :root { --bg: #050b14; --card: #0f172a; --accent: #34d399; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; max-width: 400px; margin: 0 auto; }
        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .header { font-weight: bold; color: var(--accent); }
        button { margin-top: 20px; padding: 10px; background: var(--accent); border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="app" class="card">
        <h2>Loading Prayer Times...</h2>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxZVQfNzONfCldm77yBhkPLeUvPi12D1rAfoYUXhRGX_e25fPBYXr29wAUfvbcqYAPq/exec?action=getData';

        async function initApp() {
    const API_URL = 'https://script.google.com/macros/s/AKfycbxZVQfNzONfCldm77yBhkPLeUvPi12D1rAfoYUXhRGX_e25fPBYXr29wAUfvbcqYAPq/exec?action=getData';

    try {
        const response = await fetch(API_URL);
        const text = await response.text(); // Get raw text first to debug
        
        let data;
        try {
            data = JSON.parse(text); // Try to parse it
        } catch (e) {
            console.error("Server did not send JSON. It sent:", text);
            document.getElementById('app').innerHTML = "<h2>Error: Server returned HTML instead of JSON.</h2>";
            return;
        }

        const todayRow = data.data[30]; 
        renderPrayerJourney(todayRow);
        setupNotifications(data.data);
    } catch (err) {
        console.error("Fetch Error:", err);
    }
}
        function renderPrayerJourney(row) {
            const prayers = [
                { name: "Fajr", start: row[1], jamat: row[6] },
                { name: "Sunrise", start: row[2], jamat: "-" },
                { name: "Zuhr", start: row[3], jamat: row[7] },
                { name: "Asr", start: row[4], jamat: row[8] },
                { name: "Maghrib", start: "-", jamat: row[9] },
                { name: "Isha", start: row[5], jamat: row[10] }
            ];
<div id="countdown" class="card" style="margin-bottom: 20px; text-align: center;">
    <h3 id="next-prayer-name">Loading Next Prayer...</h3>
    <h1 id="timer">00:00:00</h1>
</div>
            let html = '<h2>Today\'s Prayer Journey</h2>';
            html += '<div class="row header"><span>Prayer</span><span>Start</span><span>Jamat</span></div>';
            prayers.forEach(p => {
                html += `<div class="row"><span>${p.name}</span><span>${p.start}</span><span>${p.jamat}</span></div>`;
            });
            html += `<button onclick="testNotification()">Enable Notifications</button>`;
            document.getElementById('app').innerHTML = html;
        }
function startCountdown(rows) {
    const todayRow = rows[30]; // Keep your index
    // Mapping start times: Fajr(B), Sunrise(C), Zuhr(D), Asr(E), Isha(F)
    const prayerStarts = [
        { name: "Fajr", time: todayRow[1] },
        { name: "Sunrise", time: todayRow[2] },
        { name: "Zuhr", time: todayRow[3] },
        { name: "Asr", time: todayRow[4] },
        { name: "Isha", time: todayRow[5] }
    ];

    setInterval(() => {
        const now = new Date();
        let nextPrayer = null;

        for (let p of prayerStarts) {
            const [h, m] = p.time.split(':').map(Number);
            let prayerDate = new Date();
            prayerDate.setHours(h, m, 0, 0);

            if (prayerDate > now) {
                nextPrayer = { name: p.name, date: prayerDate };
                break; // Found the first one in the future
            }
        }

        if (nextPrayer) {
            const diff = nextPrayer.date - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('next-prayer-name').innerText = `Next: ${nextPrayer.name}`;
            document.getElementById('timer').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        } else {
            document.getElementById('next-prayer-name').innerText = "All prayers for today completed";
            document.getElementById('timer').innerText = "00:00:00";
        }
    }, 1000); // Updates every second
}
        function testNotification() {
            if (!("Notification" in window)) return;
            Notification.requestPermission().then(p => {
                if (p === "granted") new Notification("Faizan Portal", { body: "Notifications are now active!" });
            });
        }

       function setupNotifications(rows) {
    const now = new Date();
    
    // Process today's row (index 30)
    const todayRow = rows[30];
    const jamatTimes = [todayRow[6], todayRow[7], todayRow[8], todayRow[9], todayRow[10]];
    
    jamatTimes.forEach(timeStr => {
        if (!timeStr || timeStr === "-") return;
        
        const [h, m] = timeStr.split(':').map(Number);
        
        // Calculate the notification time (Jamat time minus 15 mins)
        let alarmDate = new Date();
        alarmDate.setHours(h, m - 15, 0, 0);

        // Only schedule if the alarm time is in the future
        if (alarmDate > now) {
            const delay = alarmDate.getTime() - now.getTime();
            
            console.log(`Scheduling alert for ${h}:${m} in ${Math.round(delay/60000)} minutes.`);
            
            setTimeout(() => {
                new Notification("Prayer Reminder", { 
                    body: "Jamat starts in 15 minutes!",
                    icon: "https://cdn-icons-png.flaticon.com/512/3203/3203875.png" 
                });
            }, delay);
        }
    });
}

        initApp();
    </script>
</body>
</html>
